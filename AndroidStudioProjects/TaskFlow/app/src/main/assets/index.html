// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const tod = timeOfDayLabel();

  // ── Persistence ──────────────────────────────────────────────────────────
  const STORAGE_KEY   = "taskflow_tasks_v1";
  const DARK_KEY      = "taskflow_dark_v2";
  const TUTORIAL_KEY  = "taskflow_tutorial_done";

  function loadTasks() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed) && parsed.length > 0) return parsed;
      }
    } catch(e) {}
    // Default sample tasks on first launch
    return [
      { id:uid(), title:"Review project proposal", urgency:"high", category:"Work", preferredTime:"morning", done:false, createdAt:Date.now()-9*3600000, lastUpdated:Date.now()-9*3600000, description:"Read through the Q3 proposal and add comments.", notes:"", aiSuggestion:"Start with a 10-minute skim to find key sections, then comment using the Sandwich method: strength → concern → suggestion.", color:null },
      { id:uid(), title:"Take a 30-min walk", urgency:"medium", category:"Health", preferredTime:"afternoon", done:false, createdAt:Date.now()-2*3600000, lastUpdated:Date.now()-2*3600000, notes:"", color:null },
      { id:uid(), title:"Pay electricity bill", urgency:"critical", category:"Finance", preferredTime:"anytime", done:false, createdAt:Date.now()-50*3600000, lastUpdated:Date.now()-50*3600000, notes:"", color:null },
      { id:uid(), title:"Read a book chapter", urgency:"low", category:"Learning", preferredTime:"evening", done:false, createdAt:Date.now()-1*3600000, lastUpdated:Date.now()-1*3600000, notes:"", color:null },
    ];
  }

  function loadDark() {
    try { const s = localStorage.getItem(DARK_KEY); if (s !== null) return s === "true"; } catch(e) {}
    return false;
  }

  const [tasks, setTasks] = useState(() => loadTasks());

  // Drag
  const dragIdx   = useRef(null);
  const [draggingId, setDraggingId] = useState(null);
  const [overTaskId, setOverTaskId] = useState(null);

  // Suggestions
  const [sugCategory, setSugCategory] = useState("Health");
  const [visibleSugs, setVisibleSugs] = useState({ Health:initVisible("Health"), Learning:initVisible("Learning"), Personal:initVisible("Personal") });
  const nextPoolIdx = useRef({ Health:5, Learning:5, Personal:5 });
  const [justAddedIds, setJustAddedIds] = useState(new Set());

  // Toast
  const [toast, setToast]           = useState(null);
  const [toastProgress, setToastProgress] = useState(100);
  const toastTimer  = useRef(null);
  const toastFrames = useRef(null);

  // UI
  const [activeTab, setActiveTab]   = useState("tasks");
  const [addOpen, setAddOpen]       = useState(false);
  const [filter, setFilter]         = useState("all");
  const [searchQ, setSearchQ]       = useState("");
  const [dark, setDark] = useState(() => loadDark());
  const [orgSuggestion, setOrgSuggestion] = useState("");
  const [orgOrder, setOrgOrder]     = useState(null);
  const [aiLoading, setAiLoading]   = useState(false);
  const [aiSugLoading, setAiSugLoading] = useState(false);

  // Chat
  const [chatOpen, setChatOpen]       = useState(false);
  const [chatTask, setChatTask]       = useState(null);
  const [chatHistory, setChatHistory] = useState([]);
  const [chatInput, setChatInput]     = useState("");
  const [chatLoading, setChatLoading] = useState(false);
  const chatEndRef = useRef(null);

  // Voice
  const [voiceRecording, setVoiceRecording] = useState(false);
  const [voiceLoading, setVoiceLoading]     = useState(false);
  const recognitionRef  = useRef(null);
  const longPressTimer  = useRef(null);
  const longPressFired  = useRef(false);

  // Tutorial
  const [showTutorial, setShowTutorial] = useState(() => {
    try { return !localStorage.getItem(TUTORIAL_KEY); } catch(e) { return true; }
  });
  const closeTutorial = () => {
    try { localStorage.setItem(TUTORIAL_KEY, "1"); } catch(e) {}
    setShowTutorial(false);
  };

  useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior:"smooth" }); }, [chatHistory]);

  // Persist tasks to localStorage whenever they change
  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch(e) {}
  }, [tasks]);

  // Recurring task reset — check every minute if any completed recurring tasks are due
  useEffect(() => {
    const check = () => {
      const now = Date.now();
      setTasks(prev => {
        if (!prev.some(t => t.done && t.recurrence && t.nextOccurrence && t.nextOccurrence <= now)) return prev;
        return prev.map(t =>
          (t.done && t.recurrence && t.nextOccurrence && t.nextOccurrence <= now)
            ? {...t, done:false, nextOccurrence:null, lastUpdated:Date.now()}
            : t
        );
      });
    };
    check();
    const id = setInterval(check, 60000);
    return () => clearInterval(id);
  }, []);

  // Persist dark mode + apply body.dark class for CSS variable cascade
  useEffect(() => {
    try { localStorage.setItem(DARK_KEY, String(dark)); } catch(e) {}
    if (dark) {
      document.body.classList.add('dark');
    } else {
      document.body.classList.remove('dark');
    }
    const meta = document.getElementById('theme-color-meta');
    if (meta) meta.setAttribute('content', dark ? '#000000' : '#f5f5f5');
  }, [dark]);



  // ── Toast ──────────────────────────────────────────────────────────────────
  const showToast = useCallback((message, undoFn) => {
    clearTimeout(toastTimer.current);
    cancelAnimationFrame(toastFrames.current);
    setToast({ message, undo: undoFn });
    setToastProgress(100);
    if (!undoFn) { toastTimer.current = setTimeout(() => setToast(null), 2500); return; }
    const start = Date.now();
    const DURATION = 5000;
    const tick = () => {
      const pct = Math.max(0, 100 - ((Date.now()-start)/DURATION)*100);
      setToastProgress(pct);
      if (pct > 0) toastFrames.current = requestAnimationFrame(tick);
      else setToast(null);
    };
    toastFrames.current = requestAnimationFrame(tick);
    toastTimer.current = setTimeout(() => setToast(null), DURATION);
  }, []);

  const dismissToast = () => { clearTimeout(toastTimer.current); cancelAnimationFrame(toastFrames.current); setToast(null); };

  // ── Task ops ───────────────────────────────────────────────────────────────
  const updateTask = (id, patch) => {
    setTasks(prev => prev.map(t => {
      if (t.id !== id) return t;
      const updated = {...t, ...patch};
      if (patch.done === true && !t.done && t.recurrence) {
        updated.nextOccurrence = getNextOccurrence(t.recurrence);
      }
      if (patch.done === false && t.nextOccurrence) {
        updated.nextOccurrence = null;
      }
      return updated;
    }));
  };
  const deleteTask = (id) => {
    const removed = tasks.find(t=>t.id===id);
    setTasks(prev => prev.filter(t=>t.id!==id));
    if (removed) showToast(`Removed "${removed.title}"`, () => setTasks(prev => [...prev, removed]));
  };
  const [editTask, setEditTask] = useState(null); // task being edited

  const addTask = (nt) => {
    setTasks(prev => [...prev, { ...nt, id:uid(), done:false, createdAt:Date.now(), lastUpdated:Date.now(), color:null }]);
    setAddOpen(false);
  };

  const saveEditedTask = (id, patch) => {
    setTasks(prev => prev.map(t => t.id===id ? {...t, ...patch, lastUpdated:Date.now()} : t));
  };
  const clearCompleted = () => {
    const count = tasks.filter(t=>t.done).length;
    const snapshot = tasks;
    setTasks(prev => prev.filter(t=>!t.done));
    showToast(`Cleared ${count} completed task${count!==1?"s":""}`, () => setTasks(snapshot));
  };

  // ── Suggestions ────────────────────────────────────────────────────────────
  const addSuggestion = (item) => {
    const newId = uid();
    setTasks(prev => [...prev, { ...item, id:newId, done:false, createdAt:Date.now(), lastUpdated:Date.now(), notes:"", color:null }]);
    setJustAddedIds(prev => new Set([...prev, item._uid]));
    const cat = item.category;
    const pool = POOL[cat];
    const nextIdx = nextPoolIdx.current[cat];
    setTimeout(() => {
      setVisibleSugs(prev => {
        const list = [...prev[cat]];
        const rowIdx = list.findIndex(s=>s._uid===item._uid);
        if (rowIdx===-1) return prev;
        if (nextIdx < pool.length) {
          list[rowIdx] = { ...pool[nextIdx], category:cat, _poolIdx:nextIdx, _uid:uid() };
          nextPoolIdx.current[cat] = nextIdx+1;
        } else list.splice(rowIdx,1);
        return { ...prev, [cat]:list };
      });
      setJustAddedIds(prev => { const n=new Set(prev); n.delete(item._uid); return n; });
    }, 900);
    showToast(`Added "${item.title}"`, () => setTasks(prev=>prev.filter(t=>t.id!==newId)));
  };

  const getAiSuggestions = async (cat) => {
    setAiSugLoading(true);
    try {
      const r = await askClaude(
        [{ role:"user", content:`Generate 5 specific, actionable ${cat} task suggestions. Return ONLY a JSON array:\n[{"title":"...","description":"...","urgency":"medium","preferredTime":"morning"}]\nNo markdown, no backticks.` }],
        "Respond only with valid JSON arrays. No markdown. No backticks. No extra text."
      );
      const parsed = JSON.parse(r.replace(/```json|```/g,"").trim());
      setVisibleSugs(prev => ({ ...prev, [cat]: parsed.map(s=>({...s,category:cat,_poolIdx:-1,_uid:uid()})) }));
    } catch {}
    setAiSugLoading(false);
  };

  // ── Drag ───────────────────────────────────────────────────────────────────
  const handleDragStart = (e, taskId) => {
    const activeList = tasks.filter(t=>!t.done);
    dragIdx.current = activeList.findIndex(t=>t.id===taskId);
    setDraggingId(taskId);
    e.dataTransfer.effectAllowed = "move";
  };
  const handleDragOver = (e, taskId) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    setOverTaskId(taskId);
  };
  const handleDrop = (e, taskId) => {
    e.preventDefault();
    const activeList = tasks.filter(t=>!t.done);
    const toIdx = activeList.findIndex(t=>t.id===taskId);
    const fromIdx = dragIdx.current;
    if (fromIdx===null||fromIdx===toIdx) { endDrag(); return; }
    setTasks(prev => {
      const done = prev.filter(t=>t.done);
      const active = prev.filter(t=>!t.done);
      const [moved] = active.splice(fromIdx,1);
      active.splice(toIdx,0,moved);
      return [...active,...done];
    });
    endDrag();
  };
  const endDrag = () => { dragIdx.current=null; setDraggingId(null); setOverTaskId(null); };

  // ── Chat ───────────────────────────────────────────────────────────────────
  const openChat = (task) => {
    setChatTask(task);
    setChatHistory([{ role:"assistant", content:`How can I help with **"${task.title}"**? I can suggest steps, estimate time, or break it down.` }]);
    setChatOpen(true);
  };
  const openGeneralChat = () => {
    setChatTask(null);
    setChatHistory([{ role:"assistant", content:`I can see all ${tasks.length} tasks. Ask me about priority, time estimates, or how to tackle anything on your list!` }]);
    setChatOpen(true);
  };
  // ── Voice task creation ─────────────────────────────────────────────────────
  const startVoiceTask = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { showToast("Voice input not supported on this browser", null); return; }
    const recognition = new SR();
    recognitionRef.current = recognition;
    recognition.lang = "en-US";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    setVoiceRecording(true);
    recognition.start();
    recognition.onresult = async (event) => {
      const transcript = event.results[0][0].transcript;
      setVoiceRecording(false);
      setVoiceLoading(true);
      try {
        const prompt = `Extract task details from this voice input: "${transcript}"
Reply with ONLY a JSON object, no markdown:
{"title":"concise 2-5 word task name","urgency":"low|medium|high|critical","preferredTime":"morning|afternoon|evening|night|anytime","category":"Work|Personal|Health|Finance|Home|Learning|Social|Other","description":"short description or empty string","recurrence":null}

For the recurrence field, detect any repetition in the speech:
- null → no repetition mentioned
- {"type":"daily"} → "every day", "daily", "each morning" etc.
- {"type":"weekly","days":[N,...]} → "every Monday" (1), "every Mon and Wed" ([1,3]), Sun=0,Mon=1,Tue=2,Wed=3,Thu=4,Fri=5,Sat=6
- {"type":"monthly","day":N} → "every 15th", "monthly on the 3rd" etc.
- {"type":"interval","days":N} → "every 3 days", "every 2 weeks" (14), "every other day" (2)`;
        const raw = await askClaude([{role:"user",content:prompt}], "You are a task extraction assistant. Always reply with valid JSON only.");
        const cleaned = raw.replace(/```json|```/g,"").trim();
        const s = cleaned.indexOf("{"); const e2 = cleaned.lastIndexOf("}");
        if (s !== -1 && e2 !== -1) {
          const parsed = JSON.parse(cleaned.slice(s, e2+1));
          if (parsed.title) {
            const validRecTypes = ["daily","weekly","monthly","interval"];
            const rec = (parsed.recurrence && validRecTypes.includes(parsed.recurrence.type)) ? parsed.recurrence : null;
            setTasks(prev => [...prev, {
              title: parsed.title,
              urgency: ["low","medium","high","critical"].includes(parsed.urgency) ? parsed.urgency : "medium",
              preferredTime: ["morning","afternoon","evening","night","anytime"].includes(parsed.preferredTime) ? parsed.preferredTime : "anytime",
              category: CATEGORIES.includes(parsed.category) ? parsed.category : "Work",
              description: parsed.description || "",
              notes: "", dueDate: "", recurrence: rec,
              id:uid(), done:false, createdAt:Date.now(), lastUpdated:Date.now(), color:null,
            }]);
            showToast(`🎤 Added: "${parsed.title}"${rec ? " · 🔁 recurring" : ""}`, null);
          }
        }
      } catch(e) { showToast("Could not process voice input", null); }
      setVoiceLoading(false);
      recognitionRef.current = null;
    };
    recognition.onerror = (ev) => {
      setVoiceRecording(false); setVoiceLoading(false);
      recognitionRef.current = null;
      if (ev.error !== "aborted") showToast("Voice error: " + ev.error, null);
    };
    recognition.onend = () => { recognitionRef.current = null; };
  };
  const stopVoice = () => {
    if (recognitionRef.current) { recognitionRef.current.stop(); recognitionRef.current = null; }
    setVoiceRecording(false);
  };

  const sendChat = async () => {
    if (!chatInput.trim()||chatLoading) return;
    const msg = chatInput.trim(); setChatInput("");
    const ctx = chatTask
      ? `Task:"${chatTask.title}"(urgency:${chatTask.urgency},category:${chatTask.category},time:${chatTask.preferredTime||"anytime"}). Desc:${chatTask.description||"none"}. Notes:${chatTask.notes||"none"}.`
      : `User has ${tasks.length} tasks:${tasks.map(t=>`"${t.title}"(${t.urgency},${t.category})`).join(";")}.`;
    setChatHistory(prev=>[...prev,{role:"user",content:msg}]);
    setChatLoading(true);
    try {
      const r = await askClaude([{role:"user",content:`${ctx}\n\nUser:${msg}`}]);
      setChatHistory(prev=>[...prev,{role:"assistant",content:r}]);
    } catch { setChatHistory(prev=>[...prev,{role:"assistant",content:"Connection error."}]); }
    setChatLoading(false);
  };

  // ── Smart sort ─────────────────────────────────────────────────────────────
  const applyOrgOrder = () => {
    if (!orgOrder) return;
    setTasks(prev => {
      const done = prev.filter(t=>t.done);
      const active = prev.filter(t=>!t.done);
      const reordered = [];
      orgOrder.forEach(id => { const t=active.find(x=>x.id===id); if(t) reordered.push(t); });
      active.forEach(t => { if(!reordered.find(x=>x.id===t.id)) reordered.push(t); });
      return [...reordered,...done];
    });
    setOrgSuggestion(""); setOrgOrder(null);
    showToast("✓ Task order applied!", null);
  };

  const getOrgSuggestion = async () => {
    setAiLoading(true); setOrgSuggestion(""); setOrgOrder(null);
    const active = tasks.filter(t=>!t.done);
    const taskList = active.map((t,i)=>`${i+1}. ID:${t.id} title:"${t.title}" urgency:${t.urgency} time:${t.preferredTime||"anytime"} staleness:${staleness(t)}`).join("\n");
    try {
      const r = await askClaude([{ role:"user", content:`It is ${tod} (${new Date().toLocaleTimeString()}). Tasks:\n${taskList}\n\nWrite a numbered priority list using the task TITLE (not the ID) with one short reason per item.\n\nThen on a new line write exactly: ORDER_JSON: followed by a JSON array of the task IDs in priority order. Example: ORDER_JSON: ["id1","id2"]` }]);
      const jsonMatch = r.match(/ORDER_JSON:\s*(\[.*?\])/s);
      if (jsonMatch) { try { setOrgOrder(JSON.parse(jsonMatch[1])); } catch {} }
      setOrgSuggestion(r.replace(/ORDER_JSON:.*$/s,"").trim());
    } catch { setOrgSuggestion("Could not load. Check connection."); }
    setAiLoading(false);
  };

  // ── Derived lists ──────────────────────────────────────────────────────────
  const activeTasks = tasks
    .filter(t=>!t.done)
    .filter(t=>!searchQ || t.title.toLowerCase().includes(searchQ.toLowerCase()) || (t.category||"").toLowerCase().includes(searchQ.toLowerCase()));

  const completedTasks = tasks
    .filter(t=>t.done)
    .filter(t=>!searchQ || t.title.toLowerCase().includes(searchQ.toLowerCase()) || (t.category||"").toLowerCase().includes(searchQ.toLowerCase()));

  const donePct = tasks.length ? Math.round(tasks.filter(t=>t.done).length/tasks.length*100) : 0;
  const theme = dark ? darkTheme : lightTheme;
  const catColors = { Health:"#3ecf8e", Learning:"#7c6ef5", Personal:"#f59e0b" };

  const recurringTasks    = tasks.filter(t => t.recurrence);
  const activeRecurring   = recurringTasks.filter(t => !t.done);
  const completedRecurring = recurringTasks.filter(t => t.done);

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        ::-webkit-scrollbar{width:5px;}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
        @keyframes fadeOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(6px)}}
        @keyframes slideIn{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:none}}
        @keyframes slideUp{from{opacity:0;transform:translate(-50%,20px)}to{opacity:1;transform:translate(-50%,0)}}
        @keyframes popIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
        .t-anim{animation:fadeIn .25s ease both;}
        .t-done{animation:fadeOut .3s ease both;}
        .chat-anim{animation:slideIn .25s ease both;}
        .fab-btn:hover{filter:brightness(1.1);}
      `}</style>

      <div style={{ minHeight:"100vh", background:"var(--bg)", color:"var(--text)", fontFamily:"'DM Sans',sans-serif" }}>

        {/* ── Header ── */}
        <div style={{ background:"var(--header-bg)", borderBottom:"1px solid var(--border)", padding:"12px 20px", display:"flex", alignItems:"center", gap:12 }}>
          <div style={{ flex:1 }}>
            <h1 style={{ fontFamily:"'Syne',sans-serif", fontSize:28, fontWeight:800, letterSpacing:-.5, color:"var(--text)" }}>✦ TaskFlow</h1>
            <div style={{ fontSize:13, color:"var(--text-muted)", marginTop:1 }}>Good {tod} · {tasks.filter(t=>!t.done).length} active · {donePct}% done</div>
          </div>
          <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:6 }}>
            <div style={{ display:"flex", gap:6 }}>
              <button onClick={()=>setShowTutorial(true)}
                style={{ ...iconBtn, fontSize:18, width:42, height:42, borderRadius:12 }}
                title="Help / Tutorial">❓</button>
              <button onClick={()=>setDark(v=>!v)}
                style={{ ...iconBtn, fontSize:20, width:42, height:42, borderRadius:12 }}>
                {dark ? "☀️" : "🌙"}
              </button>
            </div>
            <div style={{ width:72 }}>
              <div style={{ fontSize:10, color:"var(--text-muted)", textAlign:"right", marginBottom:3 }}>{donePct}%</div>
              <div style={{ height:5, background:"var(--border)", borderRadius:99, overflow:"hidden" }}>
                <div style={{ width:`${donePct}%`, height:"100%", background:"var(--accent)", borderRadius:99, transition:"width .5s" }} />
              </div>
            </div>
          </div>

        </div>

        {/* ── Tabs ── */}
        <div style={{ background:"var(--header-bg)", borderBottom:"1px solid var(--border)", padding:"0 20px", display:"flex" }}>
          {[["tasks","📋 Tasks"],["recurrent","🔁 Recurrent"],["suggested","✨ Suggested"]].map(([tab,label])=>(
            <button key={tab} onClick={()=>setActiveTab(tab)} style={{
              background:"none", border:"none", borderBottom:activeTab===tab?"2.5px solid var(--accent)":"2.5px solid transparent",
              padding:"13px 20px", fontSize:16, fontWeight:600, color:activeTab===tab?"var(--accent)":"var(--text-muted)",
              cursor:"pointer", fontFamily:"'DM Sans',sans-serif", transition:"all .15s",
            }}>{label}</button>
          ))}
        </div>

        <div style={{ display:"flex", height:"calc(100vh - 105px)" }}>

          {/* ══ MY TASKS TAB ══ */}
          {activeTab==="tasks" && (
            <div style={{ flex:1, overflowY:"auto", padding:"15px 20px 120px" }}>

              {/* Staleness legend */}
              <div style={{ display:"flex", gap:12, marginBottom:11, flexWrap:"wrap" }}>
                {[["fresh","<6h","var(--fresh)"],["aging","6-24h","var(--aging)"],["stale","1-3d","var(--stale)"],["critical",">3d","var(--crit)"]].map(([l,d,c])=>(
                  <div key={l} style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, color:"var(--text-muted)" }}>
                    <div style={{ width:7, height:7, borderRadius:"50%", background:c }} />
                    <span style={{ color:c, fontWeight:700 }}>{l}</span><span>{d}</span>
                  </div>
                ))}
              </div>

              {/* Controls */}
              <div style={{ display:"flex", gap:7, marginBottom:12, flexWrap:"wrap", alignItems:"center" }}>
                <input placeholder="Search tasks…" value={searchQ} onChange={e=>setSearchQ(e.target.value)}
                  style={{ flex:1, minWidth:120, background:"var(--input-bg)", border:"1px solid var(--border)", borderRadius:10, padding:"7px 11px", color:"var(--text)", fontSize:13, fontFamily:"'DM Sans',sans-serif", outline:"none" }} />
                <button onClick={getOrgSuggestion} disabled={aiLoading} style={{ background:"var(--accent)22", color:"var(--accent)", border:"1px solid var(--accent)44", borderRadius:8, padding:"6px 12px", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"'DM Sans',sans-serif" }}>
                  {aiLoading?"✦ …":"✦ Smart Sort"}
                </button>
              </div>

              {/* Drag hint */}
              <div style={{ fontSize:11, color:"var(--text-muted)", marginBottom:10, display:"flex", alignItems:"center", gap:5 }}>
                <span>⠿</span><span>Drag to reorder · 🎨 to color · ✦ to ask AI</span>
              </div>

              {/* Smart sort result */}
              {orgSuggestion && (
                <div style={{ background:"var(--accent)12", border:"1px solid var(--accent)44", borderRadius:12, padding:"11px 13px", marginBottom:12, animation:"fadeIn .3s ease" }}>
                  <div style={{ fontSize:10, fontWeight:700, color:"var(--accent)", marginBottom:4, letterSpacing:.5 }}>✦ AI PRIORITY — {tod.toUpperCase()}</div>
                  <pre style={{ fontSize:13, color:"var(--text)", whiteSpace:"pre-wrap", fontFamily:"'DM Sans',sans-serif", lineHeight:1.6, margin:0 }}>{orgSuggestion}</pre>
                  <div style={{ display:"flex", gap:10, marginTop:10, alignItems:"center" }}>
                    {orgOrder && orgOrder.length>0 && (
                      <button onClick={applyOrgOrder} style={{
                        background:"none", color:"var(--accent)",
                        border:"none", padding:0,
                        fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"'DM Sans',sans-serif",
                        textDecoration:"underline", textUnderlineOffset:3,
                      }}>↕ Apply this order</button>
                    )}
                    <button onClick={()=>{setOrgSuggestion("");setOrgOrder(null);}} style={{ fontSize:12, color:"var(--text-muted)", background:"none", border:"none", cursor:"pointer", fontFamily:"'DM Sans',sans-serif" }}>dismiss</button>
                  </div>
                </div>
              )}

              {/* Active tasks */}
              {activeTasks.length===0 && completedTasks.length===0 ? (
                <div style={{ textAlign:"center", padding:"55px 20px", color:"var(--text-muted)" }}>
                  <div style={{ fontSize:34, marginBottom:9 }}>🎯</div>
                  <div style={{ fontFamily:"'Syne',sans-serif", fontSize:15, marginBottom:3 }}>No tasks yet</div>
                  <div style={{ fontSize:13 }}>Tap the <strong style={{color:"var(--accent)"}}>+ Add Task</strong> button below</div>
                </div>
              ) : activeTasks.length===0 ? (
                <div style={{ textAlign:"center", padding:"30px 20px", color:"var(--text-muted)", fontSize:13 }}>
                  All tasks complete! 🎉
                </div>
              ) : activeTasks.map((task) => (
                <div key={task.id} className="t-anim"
                  draggable
                  onDragStart={e=>handleDragStart(e,task.id)}
                  onDragOver={e=>handleDragOver(e,task.id)}
                  onDrop={e=>handleDrop(e,task.id)}
                  onDragEnd={endDrag}>
                  <TaskCard
                    task={task}
                    onUpdate={updateTask}
                    onEdit={setEditTask}
                    onDelete={deleteTask}
                    onChat={openChat}
                    isDragging={draggingId===task.id}
                    isOver={overTaskId===task.id&&draggingId!==task.id}
                    isCompleted={false}
                  />
                </div>
              ))}

              {/* ── Completed section ── */}
              {completedTasks.length > 0 && (
                <div style={{ marginTop:24 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
                    <div style={{ height:1, flex:1, background:"var(--border)" }} />
                    <span style={{ fontSize:14, fontWeight:700, color:"var(--text-muted)", letterSpacing:.5 }}>
                      ✓ COMPLETED ({completedTasks.length})
                    </span>
                    <div style={{ height:1, flex:1, background:"var(--border)" }} />
                    <button onClick={clearCompleted} style={{
                      background:"var(--crit)18", color:"var(--crit)", border:"1px solid var(--crit)44",
                      borderRadius:8, padding:"5px 12px", fontSize:11, fontWeight:700, cursor:"pointer",
                      fontFamily:"'DM Sans',sans-serif", whiteSpace:"nowrap",
                    }}>
                      🗑 Clear all
                    </button>
                  </div>
                  {completedTasks.map(task=>(
                    <div key={task.id} style={{ animation:"fadeIn .3s ease" }}>
                      <TaskCard
                        task={task}
                        onUpdate={updateTask}
                    onEdit={setEditTask}
                        onDelete={deleteTask}
                        onChat={openChat}
                        isDragging={false}
                        isOver={false}
                        isCompleted={true}
                      />
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* ══ SUGGESTED TAB ══ */}
          {/* ══ RECURRENT TAB ══ */}
          {activeTab==="recurrent" && (
            <div style={{ flex:1, overflowY:"auto", padding:"15px 20px 120px" }}>
              <div style={{ marginBottom:14 }}>
                <h2 style={{ fontFamily:"'Syne',sans-serif", fontSize:16, fontWeight:700, color:"var(--text)", marginBottom:3 }}>🔁 Recurring Tasks</h2>
                <p style={{ fontSize:13, color:"var(--text-muted)", lineHeight:1.5 }}>All tasks set to repeat. Manage them here — they always appear even when completed.</p>
              </div>

              {recurringTasks.length === 0 ? (
                <div style={{ textAlign:"center", padding:"48px 20px", color:"var(--text-muted)" }}>
                  <div style={{ fontSize:40, marginBottom:12 }}>🔁</div>
                  <div style={{ fontSize:15, fontWeight:600, marginBottom:6 }}>No recurring tasks yet</div>
                  <div style={{ fontSize:13 }}>When creating a task, set a repeat schedule to see it here.</div>
                </div>
              ) : (
                <>
                  {activeRecurring.length > 0 && (
                    <div style={{ marginBottom:18 }}>
                      <div style={{ fontSize:11, fontWeight:700, color:"var(--text-muted)", letterSpacing:.7, textTransform:"uppercase", marginBottom:8 }}>Active ({activeRecurring.length})</div>
                      {activeRecurring.map(task => (
                        <RecurringRow key={task.id} task={task}
                          onUpdate={(patch) => updateTask(task.id, patch)}
                          onEdit={() => setEditTask(task)}
                          onDelete={() => deleteTask(task.id)}
                        />
                      ))}
                    </div>
                  )}
                  {completedRecurring.length > 0 && (
                    <div>
                      <div style={{ fontSize:11, fontWeight:700, color:"var(--text-muted)", letterSpacing:.7, textTransform:"uppercase", marginBottom:8 }}>Completed — returning soon ({completedRecurring.length})</div>
                      {completedRecurring.map(task => (
                        <RecurringRow key={task.id} task={task}
                          onUpdate={(patch) => updateTask(task.id, patch)}
                          onEdit={() => setEditTask(task)}
                          onDelete={() => deleteTask(task.id)}
                        />
                      ))}
                    </div>
                  )}
                </>
              )}
            </div>
          )}

          {activeTab==="suggested" && (
            <div style={{ flex:1, overflowY:"auto", padding:"15px 20px 110px" }}>
              <div style={{ marginBottom:13 }}>
                <h2 style={{ fontFamily:"'Syne',sans-serif", fontSize:16, fontWeight:700, color:"var(--text)", marginBottom:3 }}>✨ Suggested Tasks</h2>
                <p style={{ fontSize:15, color:"var(--text-muted)", lineHeight:1.5 }}>Check a task to add it to your list. It'll be replaced with a new one automatically.</p>
              </div>
              <div style={{ display:"flex", gap:7, marginBottom:14, flexWrap:"wrap" }}>
                {["Health","Learning","Personal"].map(cat=>{
                  const cc = catColors[cat];
                  return (
                    <button key={cat} onClick={()=>setSugCategory(cat)} style={{
                      background:sugCategory===cat?cc+"22":"var(--btn-bg)", color:sugCategory===cat?cc:"var(--text-muted)",
                      border:`1.5px solid ${sugCategory===cat?cc+"66":"var(--border)"}`,
                      borderRadius:20, padding:"7px 15px", fontSize:12, fontWeight:700,
                      cursor:"pointer", fontFamily:"'DM Sans',sans-serif", transition:"all .15s"
                    }}>{cat==="Health"?"💪":cat==="Learning"?"📚":"🌱"} {cat}</button>
                  );
                })}
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:11, marginBottom:14, padding:"11px 13px", background:"var(--accent)10", border:"1px solid var(--accent)33", borderRadius:11 }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, fontWeight:600, color:"var(--text)", marginBottom:1 }}>✦ Get fresh AI suggestions</div>
                  <div style={{ fontSize:11, color:"var(--text-muted)" }}>Replace list with 5 personalized {sugCategory} tasks</div>
                </div>
                <button onClick={()=>getAiSuggestions(sugCategory)} disabled={aiSugLoading} style={{
                  background:"var(--accent)", color:"#fff", border:"none", borderRadius:9,
                  padding:"7px 14px", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"'DM Sans',sans-serif", flexShrink:0
                }}>{aiSugLoading?"…":"Generate ✦"}</button>
              </div>
              {aiSugLoading ? (
                <div style={{ textAlign:"center", padding:"30px 0", color:"var(--text-muted)" }}>
                  <div style={{ fontSize:20, animation:"pulse 1.4s infinite", marginBottom:6 }}>✦</div>
                  <div style={{ fontSize:13 }}>Generating {sugCategory} suggestions…</div>
                </div>
              ) : visibleSugs[sugCategory].map(item=>(
                <div key={item._uid} className="t-anim">
                  <SuggestedRow item={item} onAdd={addSuggestion} justAdded={justAddedIds.has(item._uid)} />
                </div>
              ))}
            </div>
          )}

          {/* ── Chat Panel ── */}
          {chatOpen && (
            <div className="chat-anim" style={{ width:315, borderLeft:"1px solid var(--border)", display:"flex", flexDirection:"column", background:"var(--chat-bg)", flexShrink:0 }}>
              <div style={{ padding:"11px 13px", borderBottom:"1px solid var(--border)", display:"flex", alignItems:"center", gap:7 }}>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:13, color:"var(--accent)" }}>✦ AI Assistant</div>
                  {chatTask&&<div style={{ fontSize:13, color:"var(--text-muted)", marginTop:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>Re: {chatTask.title}</div>}
                </div>
                {chatTask&&<button onClick={openGeneralChat} style={{ ...iconBtn, width:"auto", padding:"0 7px", fontSize:10 }}>All tasks</button>}
                <button onClick={()=>{setChatOpen(false);setChatTask(null);}} style={iconBtn}>✕</button>
              </div>
              <div style={{ flex:1, overflowY:"auto", padding:"11px 13px" }}>
                {chatHistory.map((m,i)=>(
                  <div key={i} style={{ marginBottom:9, display:"flex", flexDirection:m.role==="user"?"row-reverse":"row", gap:6, animation:"fadeIn .2s ease" }}>
                    {m.role==="assistant"&&<div style={{ width:22, height:22, borderRadius:"50%", background:"var(--accent)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, flexShrink:0, marginTop:2 }}>✦</div>}
                    <div style={{ maxWidth:"83%", background:m.role==="user"?"var(--accent)":"var(--bubble-bg)", color:m.role==="user"?"#fff":"var(--text)",
                      borderRadius:m.role==="user"?"12px 12px 3px 12px":"12px 12px 12px 3px", padding:"8px 11px", fontSize:13, lineHeight:1.5 }}>
                      {m.content}
                    </div>
                  </div>
                ))}
                {chatLoading&&(
                  <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                    <div style={{ width:22, height:22, borderRadius:"50%", background:"var(--accent)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10 }}>✦</div>
                    <div style={{ background:"var(--bubble-bg)", borderRadius:"12px 12px 12px 3px", padding:"9px 11px", display:"flex", gap:4 }}>
                      {[0,1,2].map(j=><span key={j} style={{ width:5, height:5, borderRadius:"50%", background:"var(--accent)", animation:`pulse ${.8+j*.15}s infinite ${j*.15}s`, display:"inline-block" }} />)}
                    </div>
                  </div>
                )}
                <div ref={chatEndRef} />
              </div>
              <div style={{ padding:"10px 13px", borderTop:"1px solid var(--border)", display:"flex", gap:6 }}>
                <input value={chatInput} onChange={e=>setChatInput(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendChat()}
                  placeholder="Ask anything…"
                  style={{ flex:1, background:"var(--input-bg)", border:"1px solid var(--border)", borderRadius:10, padding:"7px 10px", color:"var(--text)", fontSize:13, fontFamily:"'DM Sans',sans-serif", outline:"none" }} />
                <button onClick={sendChat} disabled={chatLoading||!chatInput.trim()}
                  style={{ background:"var(--accent)", color:"#fff", border:"none", borderRadius:10, width:34, height:34, fontSize:14, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>→</button>
              </div>
            </div>
          )}
        </div>

        {/* ── FABs ── */}
        <div style={{ position:"fixed", bottom:24, right:24, display:"flex", flexDirection:"column", gap:10, alignItems:"flex-end", zIndex:200 }}>
          {/* AI chat FAB */}
          <button onClick={chatOpen?()=>{setChatOpen(false);setChatTask(null);}:openGeneralChat}
            style={{ background:chatOpen?"var(--btn-bg)":"var(--card-bg)", color:chatOpen?"var(--text-muted)":"var(--accent)",
              border:`2px solid ${chatOpen?"var(--border)":"var(--accent)55"}`, borderRadius:"50%",
              width:44, height:44, fontSize:18, cursor:"pointer", boxShadow:"0 3px 14px #0005",
              display:"flex", alignItems:"center", justifyContent:"center", transition:"all .2s" }}>
            {chatOpen?"✕":"✦"}
          </button>

          {/* + Add Task FAB — tap to open modal, hold to record voice */}
          <button
            onPointerDown={() => {
              longPressFired.current = false;
              longPressTimer.current = setTimeout(() => {
                longPressFired.current = true;
                startVoiceTask();
              }, 600);
            }}
            onPointerUp={() => { clearTimeout(longPressTimer.current); if (!longPressFired.current) setAddOpen(true); }}
            onPointerLeave={() => clearTimeout(longPressTimer.current)}
            style={{
              background:"var(--header-bg)",
              color:"var(--accent)",
              border:"2px solid var(--accent)",
              borderRadius:12,
              padding:"14px 24px",
              fontSize:16, fontWeight:700,
              cursor:"pointer",
              fontFamily:"'DM Sans',sans-serif",
              boxShadow:"0 3px 14px #0005",
              display:"flex", alignItems:"center", gap:6,
              transition:"all .2s", whiteSpace:"nowrap",
              userSelect:"none", WebkitUserSelect:"none",
            }}
            onMouseEnter={e=>{e.currentTarget.style.background="var(--accent)";e.currentTarget.style.color="#fff";}}
            onMouseLeave={e=>{e.currentTarget.style.background="var(--header-bg)";e.currentTarget.style.color="var(--accent)";}}>
            <span style={{ fontSize:18, lineHeight:1, fontWeight:300 }}>+</span>
            Add Task
          </button>
        </div>

        {/* Voice recording overlay */}
        {(voiceRecording || voiceLoading) && (
          <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", backdropFilter:"blur(8px)",
            display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
            zIndex:1500, gap:14 }}>
            <div style={{ fontSize:60, animation:voiceRecording?"pulse 1s infinite":"none" }}>🎤</div>
            <div style={{ color:"#fff", fontFamily:"'Syne',sans-serif", fontSize:22, fontWeight:800 }}>
              {voiceLoading ? "Creating task…" : "Listening…"}
            </div>
            <div style={{ color:"rgba(255,255,255,0.55)", fontSize:14, textAlign:"center", maxWidth:240 }}>
              {voiceLoading ? "AI is analysing your voice" : "Speak your task, then release the button"}
            </div>
            {voiceRecording && (
              <div style={{ display:"flex", gap:4, alignItems:"flex-end", height:32, marginTop:4 }}>
                {[14,22,30,22,14].map((h,i) => (
                  <div key={i} style={{ width:5, borderRadius:99, background:"var(--accent)",
                    height:h, animation:`pulse ${0.5+i*0.12}s infinite ${i*0.1}s` }} />
                ))}
              </div>
            )}
            {voiceRecording && (
              <button onClick={stopVoice} style={{ marginTop:10,
                background:"rgba(255,255,255,0.12)", color:"#fff",
                border:"1px solid rgba(255,255,255,0.25)", borderRadius:12,
                padding:"10px 28px", fontSize:14, fontWeight:600, cursor:"pointer",
                fontFamily:"'DM Sans',sans-serif" }}>
                Cancel
              </button>
            )}
          </div>
        )}

        {/* Toast */}
        {toast && (
          <UndoToast
            message={toast.message}
            progress={toastProgress}
            hasUndo={!!toast.undo}
            onUndo={()=>{ toast.undo?.(); dismissToast(); }}
            onDismiss={dismissToast}
          />
        )}

        {/* Tutorial overlay */}
        {showTutorial && <Tutorial onDone={closeTutorial} />}

        {/* Add Task Modal — rendered at top level, not inside any overflow:hidden parent */}
        {addOpen && <AddTaskModal onClose={()=>setAddOpen(false)} onAdd={addTask} />}
        {editTask && <EditTaskModal task={editTask} onClose={()=>setEditTask(null)} onSave={saveEditedTask} />}
      </div>
    </>
  );
}

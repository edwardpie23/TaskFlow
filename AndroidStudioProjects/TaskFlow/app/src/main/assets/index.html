<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
  <title>TaskFlow</title>
  <meta name="theme-color" content="#f5f5f5" id="theme-color-meta"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;width:100%;overflow:hidden;}
    #root{height:100%;width:100%;}
    body{background:#f5f5f5;padding-top:env(safe-area-inset-top,0px);padding-bottom:env(safe-area-inset-bottom,0px);}
    /* CSS variables set here so ALL elements inherit them */
    :root {
      --bg:#f5f5f5; --header-bg:#ffffff; --card-bg:#ffffff; --chat-bg:#f9f9f9;
      --bubble-bg:#efefef; --input-bg:#f0f0f0; --btn-bg:#ebebeb; --tag-bg:#ede9ff; --border:#d8d8d8;
      --text:#111111; --text-muted:#666666; --accent:#6355e8;
      --fresh:#059669; --aging:#d97706; --stale:#d9622a; --crit:#dc2626;
    }
    body.dark {
      --bg:#000000; --header-bg:#111111; --card-bg:#1a1a1a; --chat-bg:#0d0d0d;
      --bubble-bg:#222222; --input-bg:#1e1e1e; --btn-bg:#222222; --tag-bg:#1a1a2e; --border:#333333;
      --text:#ffffff; --text-muted:#aaaaaa; --accent:#a99cff;
      --fresh:#4eda9e; --aging:#fcd34d; --stale:#fb923c; --crit:#fc8181;
    }
    body, body * { color: inherit; }
    input, textarea, select { color: var(--text) !important; background: var(--input-bg) !important; }
    option { background: var(--card-bg) !important; color: var(--text) !important; }

    #splash{
      position:fixed;inset:0;background:#0f0f14;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
      z-index:9999;transition:opacity .5s ease;
    }
    #splash-icon{
      width:72px;height:72px;border-radius:22px;background:#7c6ef5;
      display:flex;align-items:center;justify-content:center;font-size:36px;
      box-shadow:0 8px 32px #7c6ef566;
    }
    #splash h1{font-family:sans-serif;font-size:28px;font-weight:800;color:#111111;letter-spacing:-.5px;}
    #splash p{font-family:sans-serif;font-size:13px;color:#666666;}
    #splash-bar{width:140px;height:3px;background:#dddddd;border-radius:99px;overflow:hidden;margin-top:4px;}
    #splash-fill{height:100%;background:#7c6ef5;border-radius:99px;width:0%;transition:width 1.5s ease;}
    @keyframes spin{from{transform:rotate(0deg) translateY(-50%)}to{transform:rotate(360deg) translateY(-50%)}}

    #error-screen{
      display:none;position:fixed;inset:0;background:#0f0f14;
      flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:32px;
      z-index:9998;
    }
    #error-screen h2{font-family:sans-serif;font-size:20px;color:#ef4444;font-weight:700;}
    #error-screen p{font-family:sans-serif;font-size:13px;color:#6b6b88;text-align:center;line-height:1.6;}
    #retry-btn{
      background:#7c6ef5;color:#fff;border:none;border-radius:12px;
      padding:12px 28px;font-size:14px;font-weight:700;font-family:sans-serif;cursor:pointer;
      margin-top:8px;
    }
  </style>
</head>
<body>

<div id="splash">
  <div id="splash-icon">✦</div>
  <h1>TaskFlow</h1>
  <p>AI-powered task manager</p>
  <div id="splash-bar"><div id="splash-fill" id="splash-fill"></div></div>
</div>

<div id="error-screen">
  <div style="font-size:40px">📡</div>
  <h2>Loading failed</h2>
  <p>TaskFlow needs internet on first launch to load its resources. Please check your connection and try again.</p>
  <button id="retry-btn" onclick="location.reload()">Retry</button>
</div>

<div id="root"></div>

<script>
  // Start progress bar animation
  setTimeout(function(){ document.getElementById('splash-fill').style.width='85%'; }, 50);

  var LOAD_TIMEOUT = 20000; // 20 seconds
  var loadTimer = setTimeout(function(){
    document.getElementById('splash').style.display = 'none';
    document.getElementById('error-screen').style.display = 'flex';
  }, LOAD_TIMEOUT);

  function hideSplash(){
    clearTimeout(loadTimer);
    var fill = document.getElementById('splash-fill');
    if(fill) fill.style.width = '100%';
    setTimeout(function(){
      var s = document.getElementById('splash');
      if(s){ s.style.opacity='0'; setTimeout(function(){ if(s) s.remove(); }, 500); }
    }, 300);
  }

  // Global error handler
  window.addEventListener('error', function(e){
    console.error('Global error:', e.message, e.filename, e.lineno);
  });
</script>

function staleness(task) {
  const hrs = (Date.now() - (task.lastUpdated || task.createdAt)) / 3600000;
  if (hrs > 72) return "critical";
  if (hrs > 24) return "stale";
  if (hrs > 6)  return "aging";
  return "fresh";
}
function stalenessColor(s) {
  return { fresh:"var(--fresh)", aging:"var(--aging)", stale:"var(--stale)", critical:"var(--crit)" }[s];
}
function timeOfDayLabel() {
  const h = new Date().getHours();
  if (h < 6)  return "night";
  if (h < 12) return "morning";
  if (h < 17) return "afternoon";
  if (h < 21) return "evening";
  return "night";
}

function getNextOccurrence(recurrence) {
  if (!recurrence) return null;
  const now = new Date();
  if (recurrence.type === "daily") {
    const n = new Date(now); n.setDate(n.getDate()+1); n.setHours(6,0,0,0); return n.getTime();
  }
  if (recurrence.type === "weekly") {
    for (let i = 1; i <= 14; i++) {
      const c = new Date(now); c.setDate(c.getDate()+i); c.setHours(6,0,0,0);
      if ((recurrence.days||[]).includes(c.getDay())) return c.getTime();
    }
  }
  if (recurrence.type === "monthly") {
    const target = recurrence.day || 1;
    const c = new Date(now); c.setDate(c.getDate()+1); c.setHours(6,0,0,0);
    for (let i = 0; i < 60; i++) {
      if (c.getDate() === target) return c.getTime();
      c.setDate(c.getDate()+1);
    }
  }
  if (recurrence.type === "interval") {
    const n = new Date(now); n.setDate(n.getDate()+(recurrence.days||7)); n.setHours(6,0,0,0); return n.getTime();
  }
  return null;
}
const REC_DAY_NAMES = ["Su","Mo","Tu","We","Th","Fr","Sa"];

const GROQ_API_KEY = "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";

async function askClaude(messages, system) {
  if (!GROQ_API_KEY || GROQ_API_KEY === "YOUR_GROQ_KEY_HERE") {
    return "⚠️ No API key set. Open index.html and replace YOUR_GROQ_KEY_HERE with your free key from console.groq.com";
  }

  const systemMsg = {
    role: "system",
    content: system || "You are a focused productivity assistant. Help users complete tasks efficiently, suggest next actions, give time estimates, and break down complex tasks. Keep answers concise (2-4 sentences). Factor in time of day, urgency, and task dependencies."
  };
  const payload = JSON.stringify({
    model: "llama-3.3-70b-versatile",
    messages: [systemMsg, ...messages],
    max_tokens: 1200,
    temperature: 0.7,
  });

  try {
    // ── On Android: use Java bridge (bypasses CORS completely) ──────────────
    if (window.Android && window.Android.groqPost) {
      // Trim key to remove any accidental whitespace
      const cleanKey = GROQ_API_KEY.trim();
      const resultStr = window.Android.groqPost(cleanKey, payload);
      let result;
      try { result = JSON.parse(resultStr); }
      catch(e) { return "❌ Bridge parse error: " + resultStr; }

      if (result.status < 200 || result.status >= 300) {
        // Show full error detail to help debug
        const errMsg = result.body?.error?.message || JSON.stringify(result.body);
        return "❌ API Error " + result.status + ": " + errMsg;
      }
      return result.body?.choices?.[0]?.message?.content || "No response.";
    }

    // ── On browser/PC: use fetch() ──────────────────────────────────────────
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + GROQ_API_KEY,
      },
      body: payload,
    });
    if (!res.ok) {
      const err = await res.text();
      return "❌ API Error " + res.status + ": " + err;
    }
    const data = await res.json();
    return data?.choices?.[0]?.message?.content || "No response.";

  } catch(e) {
    return "❌ Error: " + e.message;
  }
}

// ── Suggestion pool ───────────────────────────────────────────────────────────

// ── Shared styles ─────────────────────────────────────────────────────────────
const iconBtn = {
  background: "var(--btn-bg)", border: "1px solid var(--border)", borderRadius: 10,
  width: 38, height: 38, display: "flex", alignItems: "center", justifyContent: "center",

// Determine readable text color for a card color
function textOnColor(hex) {
  if (!hex) return null;
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114) / 1000 > 128 ? "#1a1a2e" : "#f0f0f8";
}

// ── TaskCard ──────────────────────────────────────────────────────────────────
function TaskCard({ task, onUpdate, onDelete, onChat, onEdit, isDragging, isOver, isCompleted }) {
  const age = staleness(task);
  const ageColor = stalenessColor(age);
  const [expanded, setExpanded] = useState(false);
  const [aiInsight, setAiInsight] = useState(null);
  const [aiInsightLoading, setAiInsightLoading] = useState(false);

  // Stopwatch
  const [totalElapsed, setTotalElapsed] = useState(0); // accumulated seconds from past sessions
  const sessionStartRef = useRef(null);
  const [, setTick] = useState(0); // triggers re-render each second
  const tickTimerRef = useRef(null);

  const currentElapsed = sessionStartRef.current
    ? totalElapsed + Math.floor((Date.now() - sessionStartRef.current) / 1000)
    : totalElapsed;
  const fmtTime = (s) => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  useEffect(() => () => clearInterval(tickTimerRef.current), []);

  const cardColor = task.color || null;
  const textColor = cardColor ? textOnColor(cardColor) : null;
  const onCard      = textColor || "var(--text)";
  const onCardMuted = cardColor ? textColor + "aa" : "var(--text-muted)";

  const urgencyEmoji = { low:"🟢", medium:"🟡", high:"🟠", critical:"🔴" }[task.urgency];
  const todIcon = { morning:"🌅", afternoon:"☀️", evening:"🌆", night:"🌙", anytime:"🔄" }[task.preferredTime||"anytime"];
  const borderColor = isOver ? "var(--accent)" : cardColor ? cardColor : ageColor;

  const handleCardClick = () => {
    if (isCompleted) return;
    const opening = !expanded;
    setExpanded(opening);
    if (opening) {
      // Start stopwatch
      sessionStartRef.current = Date.now();
      tickTimerRef.current = setInterval(() => setTick(t => t + 1), 1000);
    } else {
      // Stop stopwatch and accumulate time
      if (sessionStartRef.current) {
        const secs = Math.floor((Date.now() - sessionStartRef.current) / 1000);
        setTotalElapsed(prev => prev + secs);
        sessionStartRef.current = null;
      }
      clearInterval(tickTimerRef.current);
    }
    // Fetch AI insight the first time card is opened
    if (opening && !aiInsight && !aiInsightLoading) {
      setAiInsightLoading(true);
      const prompt = `Task: "${task.title}"
Urgency: ${task.urgency} | Time: ${task.preferredTime||"anytime"} | Category: ${task.category||"General"}
${task.description ? "Description: " + task.description : ""}

Give ONE short, specific, actionable insight about this task in 1-2 sentences. Be direct and practical.`;
      askClaude([{role:"user", content:prompt}], "You are a concise productivity coach. Give short, specific, actionable insights. No fluff.")
        .then(result => { setAiInsight(result); setAiInsightLoading(false); })
        .catch(() => setAiInsightLoading(false));
    }
  };

  return (
    <div
      onClick={handleCardClick}
      style={{
        background: cardColor || "var(--card-bg)",
        border: `1.5px solid ${borderColor}`,
        borderLeft: `5px solid ${cardColor || ageColor}`,
        borderRadius: 16,
        padding: "16px 16px",
        marginBottom: 12,
        transition: "opacity .35s ease, box-shadow .2s, transform .1s",
        opacity: isDragging ? 0.4 : isCompleted ? 0.55 : 1,
        boxShadow: isOver
          ? "0 0 0 2px var(--accent), 0 4px 20px #0003"
          : cardColor ? `0 4px 18px ${cardColor}44`
          : age==="critical" ? `0 0 16px ${ageColor}44`
          : age==="stale"    ? `0 0 8px ${ageColor}22`
          : "0 2px 8px #0001",
        animation: !cardColor && age==="critical" ? "pulse 2.5s infinite" : "none",
        cursor: isCompleted ? "default" : "pointer",
        userSelect: "none",
        position: "relative",
      }}>

      {/* ── Top row: checkbox + title + action buttons ── */}
      <div style={{ display:"flex", alignItems:"center", gap:12 }}>
        <input type="checkbox" checked={task.done}
          onChange={e => onUpdate(task.id, { done: e.target.checked, lastUpdated: Date.now() })}
          onClick={e => e.stopPropagation()}
          style={{ accentColor: cardColor || "var(--accent)", width:20, height:20, flexShrink:0, cursor:"pointer" }} />

        {/* Title — main focus */}
        <span style={{
          fontFamily:"'Syne',sans-serif", fontSize:17, fontWeight:700, flex:1,
          color: task.done ? onCardMuted : onCard,
          textDecoration: task.done ? "line-through" : "none",
          lineHeight: 1.3,
        }}>
          {task.title}
        </span>

        {/* Right side buttons */}
        <div style={{ display:"flex", gap:6, flexShrink:0 }} onClick={e=>e.stopPropagation()}>
          {!isCompleted && (
            <button onClick={e=>{e.stopPropagation();onChat(task);}}
              style={{ ...iconBtn, background:"var(--accent)", color:"#fff", width:36, height:36 }}>✦</button>
          )}
          <button onClick={e=>{e.stopPropagation();onDelete(task.id);}}
            style={{ ...iconBtn, color: cardColor ? textColor : "var(--crit)", width:36, height:36 }}>✕</button>
        </div>
      </div>

      {/* ── Meta row: urgency · time · category · staleness ── */}
      <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginTop:10, paddingLeft:32 }}>
        <span style={{ fontSize:13, color:onCardMuted }}>{urgencyEmoji} {task.urgency}</span>
        <span style={{ fontSize:13, color:onCardMuted }}>·</span>
        <span style={{ fontSize:13, color:onCardMuted }}>{todIcon} {task.preferredTime||"anytime"}</span>
        {task.category && <>
          <span style={{ fontSize:13, color:onCardMuted }}>·</span>
          <span style={{ fontSize:12, padding:"2px 8px", borderRadius:10,
            background: cardColor ? "rgba(0,0,0,0.15)" : "var(--tag-bg)",
            color: cardColor ? textColor : "var(--accent)", fontWeight:600 }}>{task.category}</span>
        </>}
        {task.dueDate && <>
          <span style={{ fontSize:13, color:onCardMuted }}>·</span>
          <span style={{ fontSize:13, color:onCardMuted }}>📅 {new Date(task.dueDate).toLocaleDateString()}</span>
        </>}
        {!isCompleted && (
          <span style={{ fontSize:11, padding:"2px 7px", borderRadius:20,
            background: cardColor ? "rgba(0,0,0,0.18)" : ageColor+"22",
            color: cardColor ? textColor : ageColor, fontWeight:700 }}>
            {age==="critical" ? "⚠ critical" : age}
          </span>
        )}
        {!expanded && totalElapsed > 0 && (
          <>
            <span style={{ fontSize:13, color:onCardMuted }}>·</span>
            <span style={{ fontSize:11, color:onCardMuted }}>⏱ {fmtTime(totalElapsed)}</span>
          </>
        )}
        {task.recurrence && !isCompleted && (
          <>
            <span style={{ fontSize:13, color:onCardMuted }}>·</span>
            <span style={{ fontSize:11, color:"var(--accent)", fontWeight:600 }}>
              🔁 {task.recurrence.type === "daily" ? "daily"
                : task.recurrence.type === "weekly" ? REC_DAY_NAMES.filter((_,i)=>(task.recurrence.days||[]).includes(i)).join(" ")
                : task.recurrence.type === "monthly" ? `day ${task.recurrence.day} monthly`
                : task.recurrence.type === "interval" ? `every ${task.recurrence.days}d`
                : "recurring"}
            </span>
          </>
        )}
        {isCompleted && task.recurrence && task.nextOccurrence && (
          <>
            <span style={{ fontSize:13, color:onCardMuted }}>·</span>
            <span style={{ fontSize:11, color:"var(--accent)", fontWeight:600 }}>
              🔁 {new Date(task.nextOccurrence).toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"})}
            </span>
          </>
        )}
      </div>

      {/* ── Expanded panel ── */}
      {expanded && !isCompleted && (
        <div style={{ marginTop:14, paddingTop:14, borderTop:`1px solid ${cardColor?"rgba(0,0,0,0.15)":"var(--border)"}` }}
          onClick={e=>e.stopPropagation()}>

          {/* Stopwatch — running while expanded */}
          <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:12,
            padding:"7px 12px", borderRadius:10,
            background: cardColor ? "rgba(0,0,0,0.12)" : "var(--accent)0d" }}>
            <span style={{ fontSize:16 }}>⏱</span>
            <span style={{ fontSize:15, fontWeight:700, color:"var(--accent)", fontFamily:"monospace" }}>
              {fmtTime(currentElapsed)}
            </span>
            <span style={{ fontSize:11, color:onCardMuted }}>time on task</span>
          </div>

          {/* AI Insight — loads when card first opens */}
          <div style={{ marginBottom:14, padding:"12px 14px",
            background: cardColor ? "rgba(0,0,0,0.12)" : "var(--accent)11",
            borderRadius:12, borderLeft:"3px solid var(--accent)" }}>
            <div style={{ fontSize:11, fontWeight:700, color:"var(--accent)", marginBottom:5, letterSpacing:.5 }}>✦ AI INSIGHT</div>
            {aiInsightLoading ? (
              <div style={{ fontSize:14, color:"var(--text-muted)", fontStyle:"italic" }}>Thinking…</div>
            ) : aiInsight ? (
              <p style={{ fontSize:14, color:"var(--text)", lineHeight:1.6, margin:0 }}>{aiInsight}</p>
            ) : (
              <div style={{ fontSize:14, color:"var(--text-muted)", fontStyle:"italic" }}>No insight yet</div>
            )}
          </div>

          {task.description && (
            <p style={{ fontSize:14, color:onCardMuted, marginBottom:12, lineHeight:1.6, paddingLeft:2 }}>{task.description}</p>
          )}

          {/* Color picker */}
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:11, color:onCardMuted, fontWeight:700, letterSpacing:.5, marginBottom:7 }}>CARD COLOR</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
              {CARD_COLORS.map(c => (
                <button key={c.label} title={c.label}
                  onClick={()=>onUpdate(task.id,{color:c.value,lastUpdated:Date.now()})}
                  style={{
                    width: c.value ? 26 : 40, height:26, borderRadius: c.value ? "50%" : 8,
                    background: c.value || "var(--btn-bg)",
                    border: task.color===c.value ? "3px solid var(--accent)" : c.value ? "2px solid transparent" : "1px solid var(--border)",
                    cursor:"pointer", outline:"none", padding:0,
                    fontSize:10, color:"var(--text-muted)", fontFamily:"'DM Sans',sans-serif",
                  }}>{!c.value?"none":""}</button>
              ))}
            </div>
          </div>

          {/* Edit button */}
          <button
            onClick={e=>{e.stopPropagation();onEdit(task);}}
            style={{ background:"var(--btn-bg)", border:"1px solid var(--border)", borderRadius:10,
              padding:"9px 18px", fontSize:14, fontWeight:600, color:"var(--accent)",
              cursor:"pointer", fontFamily:"'DM Sans',sans-serif", width:"100%", marginBottom:10 }}>
            ✏️ Edit this task
          </button>

          {/* Notes */}
          <textarea placeholder="Notes…" value={task.notes||""}
            onChange={e=>onUpdate(task.id,{notes:e.target.value,lastUpdated:Date.now()})}
            style={{ ...inputStyle, minHeight:60, resize:"vertical",
              marginBottom: task.aiSuggestion ? 10 : 0,
              background: cardColor?"rgba(0,0,0,0.1)":"var(--input-bg)",
              color:onCard, borderColor: cardColor?"rgba(0,0,0,0.2)":"var(--border)" }} />

          {/* AI suggestion */}
          {task.aiSuggestion && (
            <div style={{ padding:"10px 13px", background: cardColor?"rgba(0,0,0,0.12)":"var(--accent)12",
              borderRadius:10, borderLeft:"3px solid "+(cardColor?textColor:"var(--accent)") }}>
              <div style={{ fontSize:11, fontWeight:700, color:cardColor?textColor:"var(--accent)", marginBottom:4, letterSpacing:.5 }}>✦ AI SUGGESTION</div>
              <p style={{ fontSize:14, color:onCard, lineHeight:1.6, margin:0 }}>{task.aiSuggestion}</p>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Tutorial ──────────────────────────────────────────────────────────────────
function Tutorial({ onDone }) {
  const [step, setStep] = useState(0);
  const STEPS = [
    {
      icon: "✦",
      title: "Welcome to TaskFlow",
      body: "A smart AI-powered task manager. Let's walk through the key features — takes about a minute.",
    },
    {
      icon: "🎤",
      title: "Voice Task Creation",
      body: "Press & hold the + Add Task button for ~0.6 seconds to record your task with your voice. AI transcribes and creates the task automatically — title, priority, time, and category all set.",
      hint: "Try holding the button after this tour",
    },
    {
      icon: "✍️",
      title: "Smart Natural Language Input",
      body: "In the New Task form, type anything naturally — \"walk the dog tonight after work\" — and AI rewrites it to a clean title, then picks urgency, best time, and category for you.",
      hint: "Try it — AI updates the fields as you type",
    },
    {
      icon: "⏱",
      title: "Built-in Task Timer",
      body: "Tap any task card to expand it. A stopwatch starts immediately and tracks how long you spend on it. When you close the card, the time is saved and shown as a small badge.",
      hint: "Tap any task to start the timer",
    },
    {
      icon: "🔁",
      title: "Recurring Tasks",
      body: "When creating a task, set it to repeat — every day, on specific weekdays, monthly on a date, or every N days. Completed recurring tasks reappear automatically at the scheduled time.",
      hint: "Find all recurring tasks in the Recurrent tab",
    },
    {
      icon: "✦",
      title: "AI Smart Sort",
      body: "Tap ✦ Smart Sort above your task list. AI analyses urgency, how stale each task is, and the current time of day, then suggests an optimal order. Apply it with one tap.",
      hint: "Find Smart Sort in the My Tasks tab",
    },
    {
      icon: "🎯",
      title: "You're all set!",
      body: "Tap the ❓ button in the header anytime to replay this tour. Now go conquer your tasks!",
    },
  ];
  const s = STEPS[step];
  const isLast = step === STEPS.length - 1;

  return (
    <div onClick={e=>e.stopPropagation()}
      style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.90)", backdropFilter:"blur(10px)",
        display:"flex", alignItems:"center", justifyContent:"center", zIndex:2500, padding:20 }}>
      <div style={{ background:"var(--card-bg)", borderRadius:24, padding:"28px 24px 22px",
        width:"100%", maxWidth:390, position:"relative", animation:"popIn .25s ease",
        boxShadow:"0 32px 90px #000a" }}>

        {/* Skip button */}
        {!isLast && (
          <button onClick={onDone}
            style={{ position:"absolute", top:14, right:16, background:"none", border:"none",
              color:"var(--text-muted)", fontSize:13, cursor:"pointer",
              fontFamily:"'DM Sans',sans-serif", padding:"4px 8px" }}>
            Skip
          </button>
        )}

        {/* Progress bar */}
        <div style={{ display:"flex", gap:4, marginBottom:26 }}>
          {STEPS.map((_,i) => (
            <div key={i} style={{ flex:i===step?3:1, height:4, borderRadius:99, transition:"all .3s",
              background: i<=step?"var(--accent)":"var(--border)" }} />
          ))}
        </div>

        {/* Icon */}
        <div style={{ textAlign:"center", fontSize:58, lineHeight:1, marginBottom:18 }}>{s.icon}</div>

        {/* Title */}
        <h2 style={{ fontFamily:"'Syne',sans-serif", fontSize:21, fontWeight:800,
          color:"var(--text)", textAlign:"center", marginBottom:12 }}>{s.title}</h2>

        {/* Body */}
        <p style={{ fontSize:14.5, color:"var(--text-muted)", textAlign:"center",
          lineHeight:1.72, marginBottom: s.hint ? 12 : 26, padding:"0 4px" }}>{s.body}</p>

        {/* Hint chip */}
        {s.hint && (
          <div style={{ textAlign:"center", fontSize:12, color:"var(--accent)", fontWeight:600,
            marginBottom:22, padding:"6px 14px", background:"var(--accent)12",
            borderRadius:20, display:"inline-block", width:"100%", boxSizing:"border-box" }}>
            → {s.hint}
          </div>
        )}

        {/* Navigation */}
        <div style={{ display:"flex", gap:8 }}>
          {step > 0 && (
            <button onClick={()=>setStep(v=>v-1)}
              style={{ background:"var(--btn-bg)", color:"var(--text-muted)", border:"1px solid var(--border)",
                borderRadius:12, padding:"11px 16px", fontSize:14, cursor:"pointer",
                fontFamily:"'DM Sans',sans-serif", flexShrink:0 }}>← Back</button>
          )}
          <button onClick={isLast ? onDone : ()=>setStep(v=>v+1)}
            style={{ flex:1, background:"var(--accent)", color:"#fff", border:"none",
              borderRadius:12, padding:"12px", fontSize:15, fontWeight:700, cursor:"pointer",
              fontFamily:"'DM Sans',sans-serif" }}>
            {isLast ? "Let's go! 🚀" : "Next →"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── RecurringRow ───────────────────────────────────────────────────────────────
function RecurringRow({ task, onUpdate, onEdit, onDelete }) {
  const rec = task.recurrence;
  const recLabel = !rec ? "" :
    rec.type === "daily"    ? "Every day" :
    rec.type === "weekly"   ? "Every " + REC_DAY_NAMES.filter((_,i)=>(rec.days||[]).includes(i)).join(" ") :
    rec.type === "monthly"  ? `Day ${rec.day} of each month` :
    rec.type === "interval" ? `Every ${rec.days} day${rec.days!==1?"s":""}` : "Recurring";

  const urgencyEmoji = { low:"🟢", medium:"🟡", high:"🟠", critical:"🔴" }[task.urgency] || "";
  const catColor = { Work:"#6355e8", Personal:"#f59e0b", Health:"#3ecf8e", Finance:"#06b6d4",
    Home:"#f97316", Learning:"#7c6ef5", Social:"#ec4899", Other:"#94a3b8" }[task.category] || "var(--accent)";

  return (
    <div style={{ background:"var(--card-bg)",
      border:`1.5px solid ${task.done ? "var(--border)" : "var(--accent)44"}`,
      borderLeft:`5px solid ${task.done ? "var(--border)" : "var(--accent)"}`,
      borderRadius:14, padding:"13px 14px", marginBottom:10,
      opacity: task.done ? 0.75 : 1, transition:"opacity .2s" }}>

      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
        <input type="checkbox" checked={task.done}
          onChange={e=>onUpdate(task.id,{done:e.target.checked,lastUpdated:Date.now()})}
          style={{ width:18, height:18, accentColor:"var(--accent)", cursor:"pointer", flexShrink:0 }} />

        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontFamily:"'Syne',sans-serif", fontSize:15, fontWeight:700,
            color: task.done ? "var(--text-muted)" : "var(--text)",
            textDecoration: task.done ? "line-through" : "none",
            marginBottom:6, lineHeight:1.3 }}>
            {task.title}
          </div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
            <span style={{ fontSize:11, padding:"2px 9px", borderRadius:20,
              background:"var(--accent)15", color:"var(--accent)", fontWeight:700 }}>
              🔁 {recLabel}
            </span>
            <span style={{ fontSize:11, padding:"2px 8px", borderRadius:20,
              background:catColor+"18", color:catColor, fontWeight:600 }}>
              {task.category}
            </span>
            <span style={{ fontSize:11, color:"var(--text-muted)" }}>{urgencyEmoji} {task.urgency}</span>
            {task.done && task.nextOccurrence && (
              <span style={{ fontSize:11, color:"var(--accent)", fontWeight:600 }}>
                · Returns {new Date(task.nextOccurrence).toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"})}
              </span>
            )}
            {task.done && !task.nextOccurrence && task.recurrence && (
              <span style={{ fontSize:11, color:"var(--text-muted)" }}>· Completed</span>
            )}
          </div>
        </div>

        <div style={{ display:"flex", gap:5, flexShrink:0 }}>
          <button onClick={()=>onEdit(task)}
            style={{ ...iconBtn, width:32, height:32, fontSize:14 }}>✏️</button>
          <button onClick={()=>onDelete(task.id)}
            style={{ ...iconBtn, width:32, height:32, color:"var(--crit)" }}>✕</button>
        </div>
      </div>
    </div>
  );
}

// ── SuggestedRow ──────────────────────────────────────────────────────────────
function SuggestedRow({ item, onAdd, justAdded }) {
  const catColor = { Health:"#3ecf8e", Learning:"#7c6ef5", Personal:"#f59e0b" }[item.category] || "var(--accent)";
  const todIcon = { morning:"🌅", afternoon:"☀️", evening:"🌆", night:"🌙", anytime:"🔄" }[item.preferredTime||"anytime"];
  return (
    <div style={{
      display:"flex", alignItems:"center", gap:12,
      background: justAdded ? "var(--accent)18" : "var(--card-bg)",
      border: `1.5px solid ${justAdded ? "var(--accent)66" : "var(--border)"}`,
      borderLeft: `5px solid ${catColor}`,
      borderRadius:13, padding:"11px 14px", marginBottom:9, transition:"all .25s",
    }}>
      <input type="checkbox" checked={justAdded}
        onChange={() => !justAdded && onAdd(item)}
        style={{ width:18, height:18, accentColor:"var(--accent)", cursor:justAdded?"default":"pointer", flexShrink:0 }} />
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontFamily:"'Syne',sans-serif", fontSize:17, fontWeight:700,
          color:justAdded?"var(--text-muted)":"var(--text)", textDecoration:justAdded?"line-through":"none", marginBottom:2 }}>
          {item.title}
        </div>
        <div style={{ fontSize:12, color:"var(--text-muted)", lineHeight:1.4 }}>{item.description}</div>
        <div style={{ display:"flex", gap:7, marginTop:5, flexWrap:"wrap" }}>
          <span style={{ fontSize:11, padding:"1px 7px", borderRadius:20, background:catColor+"20", color:catColor, fontWeight:700 }}>{item.category}</span>
          <span style={{ fontSize:11, color:"var(--text-muted)" }}>{todIcon} {item.preferredTime||"anytime"}</span>
          <span style={{ fontSize:11, color:"var(--text-muted)" }}>· {item.urgency}</span>
        </div>
      </div>
      {justAdded && <div style={{ fontSize:12, color:"var(--accent)", fontWeight:600, flexShrink:0 }}>✓ Added</div>}
    </div>
  );
}

// ── UndoToast ─────────────────────────────────────────────────────────────────
function UndoToast({ message, onUndo, onDismiss, progress, hasUndo }) {
  return (
    <div style={{
      position:"fixed", bottom:110, left:"50%", transform:"translateX(-50%)",
      background:"var(--card-bg)", border:"1.5px solid var(--accent)66",
      borderRadius:14, padding:"11px 16px", display:"flex", alignItems:"center", gap:12,
      boxShadow:"0 8px 30px #0006", zIndex:600, animation:"slideUp .22s ease",
      minWidth:240, maxWidth:340,
    }}>
      <div style={{ flex:1 }}>
        <div style={{ fontSize:13, color:"var(--text)", fontWeight:500 }}>{message}</div>
        {hasUndo && (
          <div style={{ height:3, background:"var(--border)", borderRadius:99, marginTop:6, overflow:"hidden" }}>
            <div style={{ height:"100%", background:"var(--accent)", borderRadius:99, width:`${progress}%`, transition:"width .1s linear" }} />
          </div>
        )}
      </div>
      {hasUndo && <button onClick={onUndo} style={{ background:"var(--accent)", color:"#fff", border:"none", borderRadius:9, padding:"6px 13px", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"'DM Sans',sans-serif", flexShrink:0 }}>Undo</button>}
      <button onClick={onDismiss} style={{ ...iconBtn, width:24, height:24, flexShrink:0, fontSize:11 }}>✕</button>
    </div>
  );
}

// ── Add Task Modal ────────────────────────────────────────────────────────────
// ── Shared modal form fields ──────────────────────────────────────────────────
function TaskFormFields({ t, setT, aiPicked }) {
  const timeOpts = ["anytime","morning","afternoon","evening","night"];
  const fieldStyle = { ...selectStyle, width:"100%", padding:"8px 10px", fontSize:13 };
  const labelStyle = { fontSize:13, color:"var(--text-muted)", display:"block", marginBottom:4, fontWeight:700, letterSpacing:.5 };
  const aiBadge = {
    fontSize:9, fontWeight:700, letterSpacing:.5, padding:"1px 5px", borderRadius:8,
    background:"var(--accent)22", color:"var(--accent)", marginLeft:5,
  };
  return (
    <>
      <textarea
        placeholder="Description (optional)"
        value={t.description||""}
        onChange={e=>setT(v=>({...v,description:e.target.value}))}
        style={{ ...inputStyle, minHeight:58, resize:"vertical", marginBottom:11 }}
      />
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:9, marginBottom:14 }}>
        <div>
          <label style={labelStyle}>
            URGENCY {aiPicked?.urgency && <span style={aiBadge}>✦ AI</span>}
          </label>
          <select value={t.urgency} onChange={e=>setT(v=>({...v,urgency:e.target.value}))}
            style={{ ...fieldStyle, borderColor: aiPicked?.urgency ? "var(--accent)66" : undefined }}>
            {URGENCY_LABELS.map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        </div>
        <div>
          <label style={labelStyle}>
            BEST TIME {aiPicked?.preferredTime && <span style={aiBadge}>✦ AI</span>}
          </label>
          <select value={t.preferredTime||"anytime"} onChange={e=>setT(v=>({...v,preferredTime:e.target.value}))}
            style={{ ...fieldStyle, borderColor: aiPicked?.preferredTime ? "var(--accent)66" : undefined }}>
            {timeOpts.map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        </div>
        <div>
          <label style={labelStyle}>
            CATEGORY {aiPicked?.category && <span style={aiBadge}>✦ AI</span>}
          </label>
          <select value={t.category||"Work"} onChange={e=>setT(v=>({...v,category:e.target.value}))}
            style={{ ...fieldStyle, borderColor: aiPicked?.category ? "var(--accent)66" : undefined }}>
            {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div>
          <label style={labelStyle}>DUE DATE</label>
          <input type="date" value={t.dueDate||""} onChange={e=>setT(v=>({...v,dueDate:e.target.value}))}
            style={fieldStyle} />
        </div>
      </div>
      <div>
        <label style={labelStyle}>NOTES</label>
        <textarea
          placeholder="Any extra notes..."
          value={t.notes||""}
          onChange={e=>setT(v=>({...v,notes:e.target.value}))}
          style={{ ...inputStyle, minHeight:48, resize:"vertical", marginBottom:11 }}
        />
      </div>
      <div style={{ marginBottom:11 }}>
        <label style={labelStyle}>REPEAT</label>
        <select
          value={t.recurrence ? t.recurrence.type : "none"}
          onChange={e => {
            const type = e.target.value;
            if (type === "none")     setT(v=>({...v,recurrence:null}));
            else if (type==="daily") setT(v=>({...v,recurrence:{type:"daily"}}));
            else if (type==="weekly") setT(v=>({...v,recurrence:{type:"weekly",days:v.recurrence?.type==="weekly"?(v.recurrence.days||[]):[1]}}));
            else if (type==="monthly") setT(v=>({...v,recurrence:{type:"monthly",day:v.recurrence?.day||1}}));
            else if (type==="interval") setT(v=>({...v,recurrence:{type:"interval",days:v.recurrence?.days||7}}));
          }}
          style={{ ...fieldStyle, width:"100%" }}>
          <option value="none">Never</option>
          <option value="daily">Every day</option>
          <option value="weekly">Weekly on…</option>
          <option value="monthly">Monthly on day…</option>
          <option value="interval">Every N days</option>
        </select>
        {t.recurrence?.type === "weekly" && (
          <div style={{ display:"flex", gap:5, marginTop:8 }}>
            {["S","M","T","W","T","F","S"].map((d,i) => {
              const on = (t.recurrence?.days||[]).includes(i);
              return (
                <button key={i} type="button"
                  onClick={() => {
                    const days = t.recurrence?.days||[];
                    const nd = on ? days.filter(x=>x!==i) : [...days,i].sort((a,b)=>a-b);
                    setT(v=>({...v,recurrence:{type:"weekly",days:nd}}));
                  }}
                  style={{ flex:1, height:30, borderRadius:6, fontSize:11, fontWeight:700, cursor:"pointer",
                    background:on?"var(--accent)":"var(--btn-bg)",
                    color:on?"#fff":"var(--text-muted)",
                    border:`1px solid ${on?"var(--accent)":"var(--border)"}`, padding:0 }}>
                  {d}
                </button>
              );
            })}
          </div>
        )}
        {t.recurrence?.type === "monthly" && (
          <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:8 }}>
            <span style={{ fontSize:13, color:"var(--text-muted)" }}>On day</span>
            <input type="number" min={1} max={31}
              value={t.recurrence.day||1}
              onChange={e=>setT(v=>({...v,recurrence:{type:"monthly",day:Math.min(31,Math.max(1,parseInt(e.target.value)||1))}}))}
              style={{ ...fieldStyle, width:64, padding:"5px 8px", textAlign:"center", fontSize:14 }} />
            <span style={{ fontSize:13, color:"var(--text-muted)" }}>of each month</span>
          </div>
        )}
        {t.recurrence?.type === "interval" && (
          <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:8 }}>
            <span style={{ fontSize:13, color:"var(--text-muted)" }}>Every</span>
            <input type="number" min={1} max={365}
              value={t.recurrence.days||7}
              onChange={e=>setT(v=>({...v,recurrence:{type:"interval",days:Math.min(365,Math.max(1,parseInt(e.target.value)||1))}}))}
              style={{ ...fieldStyle, width:64, padding:"5px 8px", textAlign:"center", fontSize:14 }} />
            <span style={{ fontSize:13, color:"var(--text-muted)" }}>days</span>
          </div>
        )}
      </div>
    </>
  );
}

// ── Add Task Modal ────────────────────────────────────────────────────────────
function AddTaskModal({ onClose, onAdd }) {
  const DEFAULTS = { title:"", urgency:"medium", category:"Work", preferredTime:"anytime", description:"", dueDate:"", notes:"", recurrence:null };
  const [t, setT] = useState(DEFAULTS);
  const [aiLoading, setAiLoading] = useState(false);
  const [aiPicked, setAiPicked] = useState(null); // tracks which fields AI filled
  const titleRef = useRef(null);

  // When user stops typing in title, auto-fill urgency + time via AI
  const autoFillTimer = useRef(null);
  const handleTitleChange = (val) => {
    setT(v=>({...v,title:val}));
    setAiPicked(null);
    clearTimeout(autoFillTimer.current);
    if (val.trim().length < 4) return;
    autoFillTimer.current = setTimeout(async () => {
      setAiLoading(true);
      try {
        const prompt = `The user typed this into a task input field: "${val.trim()}"
Current time of day: ${timeOfDayLabel()}

This may be a raw sentence, not a clean task title. Extract all task details.
Reply with ONLY a JSON object, no explanation, no markdown:
{"title":"concise 2-5 word task name","urgency":"low|medium|high|critical","preferredTime":"morning|afternoon|evening|night|anytime","category":"Work|Personal|Health|Finance|Home|Learning|Social|Other","reason":"one short sentence"}

Rules:
- title: convert natural language to a short action title (e.g. "I want to walk the dog tonight" → "Walk the dog")
- urgency: how time-sensitive does this sound?
- preferredTime: infer from context clues like "tonight", "after work", "in the morning"
- category: pick the most fitting from Work, Personal, Health, Finance, Home, Learning, Social, Other`;
        const raw = await askClaude([{role:"user",content:prompt}], "You are a task extraction assistant. Always reply with valid JSON only.");
        const cleaned = raw.replace(/```json|```/g,"").trim();
        const start = cleaned.indexOf("{");
        const end = cleaned.lastIndexOf("}");
        if (start !== -1 && end !== -1) {
          const parsed = JSON.parse(cleaned.slice(start, end+1));
          const picked = {};
          if (parsed.title && parsed.title.trim().length > 0) {
            setT(v=>({...v,title:parsed.title.trim()}));
            picked.title = true;
          }
          if (["low","medium","high","critical"].includes(parsed.urgency)) {
            setT(v=>({...v,urgency:parsed.urgency}));
            picked.urgency = true;
          }
          if (["morning","afternoon","evening","night","anytime"].includes(parsed.preferredTime)) {
            setT(v=>({...v,preferredTime:parsed.preferredTime}));
            picked.preferredTime = true;
          }
          if (CATEGORIES.includes(parsed.category)) {
            setT(v=>({...v,category:parsed.category}));
            picked.category = true;
          }
          setAiPicked(picked);
        }
      } catch(e) { /* silently fail */ }
      setAiLoading(false);
    }, 900);
  };

  const submit = () => { if (!t.title.trim()) return; onAdd(t); };
  const handleBackdrop = (e) => { if (e.target === e.currentTarget) onClose(); };

  return (
    <div onMouseDown={handleBackdrop}
      style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.65)", backdropFilter:"blur(4px)",
        display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000, padding:20 }}>
      <div onMouseDown={e=>e.stopPropagation()}
        style={{ background:"var(--card-bg)", borderRadius:18, padding:"22px 24px",
          width:"100%", maxWidth:440, maxHeight:"90vh", overflowY:"auto",
          boxShadow:"0 24px 70px rgba(0,0,0,0.5)", animation:"popIn .22s ease" }}>
        <div style={{ display:"flex", alignItems:"center", marginBottom:16 }}>
          <h2 style={{ fontFamily:"'Syne',sans-serif", fontSize:22, fontWeight:800, color:"var(--text)", flex:1 }}>New Task</h2>
          <button onMouseDown={e=>{e.stopPropagation();onClose();}} style={{ ...iconBtn, borderRadius:"50%" }}>✕</button>
        </div>

        <div style={{ position:"relative", marginBottom:9 }}>
          <input ref={titleRef} autoFocus
            placeholder="Describe your task in any way… *"
            value={t.title}
            onChange={e=>handleTitleChange(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&submit()}
            style={{ ...inputStyle, border:"1.5px solid var(--accent)66", fontSize:14, paddingRight:36 }}
          />
          {aiLoading && (
            <div style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)",
              fontSize:14, color:"var(--accent)", animation:"spin 1s linear infinite" }}>✦</div>
          )}
        </div>

        {aiPicked && (
          <div style={{ fontSize:12, color:"var(--accent)", marginBottom:9, padding:"6px 10px",
            background:"var(--accent)11", borderRadius:8, borderLeft:"3px solid var(--accent)" }}>
            ✦ AI refined your task — edit anything you want to change
          </div>
        )}

        <TaskFormFields t={t} setT={setT} aiPicked={aiPicked} />

        <div style={{ display:"flex", gap:9, justifyContent:"flex-end" }}>
          <button onMouseDown={e=>{e.stopPropagation();onClose();}}
            style={{ background:"var(--btn-bg)", color:"var(--text-muted)", border:"1px solid var(--border)",
              borderRadius:10, padding:"9px 17px", fontSize:13, cursor:"pointer", fontFamily:"'DM Sans',sans-serif" }}>
            Cancel
          </button>
          <button onMouseDown={e=>{e.stopPropagation();submit();}}
            style={{ background:"var(--accent)", color:"#fff", border:"none",
              borderRadius:10, padding:"9px 20px", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"'DM Sans',sans-serif" }}>
            Add Task ↵
          </button>
        </div>
      </div>
    </div>
  );
}
